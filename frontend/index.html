<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Automated ML Application</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Automated Machine Learning Application</h1>
        <p>Upload your data and let AI train the best model for you</p>
      </header>

      <main>
        <!-- File Upload Section -->
        <section id="upload-section" class="section">
          <h2>Step 1: Upload Your Data</h2>
          <div class="upload-area" id="upload-area">
            <p>Drag and drop your file here or click to browse</p>
            <input type="file" id="file-input" accept=".csv,.xlsx" hidden />
          </div>
          <div id="file-preview" class="hidden">
            <p id="file-name"></p>
          </div>
        </section>

        <!-- Data Preview Section -->
        <section id="preview-section" class="section hidden">
          <h2>Step 2: Preview Your Data</h2>
          <div id="data-preview" class="preview-table"></div>
        </section>

        <!-- Task Selection Section -->
        <section id="task-section" class="section hidden">
          <h2>Step 3: Select ML Task</h2>
          <div class="task-options">
            <label class="radio-option">
              <input type="radio" name="task" value="classification" />
              <span>Classification</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="task" value="regression" />
              <span>Regression</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="task" value="clustering" />
              <span>Clustering</span>
            </label>
          </div>

          <!-- Target Variable Selection (for supervised learning) -->
          <div id="target-section" class="hidden">
            <label for="target-column">Select Target Column:</label>
            <select id="target-column"></select>
          </div>
        </section>

        <!-- Training Section -->
        <section id="training-section" class="section hidden">
          <button id="train-button" class="btn btn-primary">
            Start Training
          </button>
          <div id="training-progress" class="hidden">
            <p>Training in progress...</p>
            <progress id="progress-bar"></progress>
          </div>
        </section>

        <!-- Results Section -->
        <section id="results-section" class="section hidden">
          <h2>Step 4: Results</h2>
          <div id="metrics-display" class="metrics-container"></div>
          <button id="download-button" class="btn btn-success">
            Download Model
          </button>
        </section>
      </main>
    </div>

    <script src="js/api-client.js"></script>
    <script src="js/uploader.js"></script>
    <script src="js/task-selector.js"></script>
    <script src="js/visualizer.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
